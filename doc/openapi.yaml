openapi: 3.1.0
info:
  title: Cinephile API
  version: 1.0.0
  description: API for managing viewing history for movies and TV series

servers:
  - url: http://localhost:8080/api
    description: Local development server

paths:
  /signup:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Register a new User
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: User Created successfully. No content returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: object
        '400':
          $ref: '#/components/responses/Error.BadRequest'
        '409':
          $ref: '#/components/responses/Error.Conflict'
        '500':
          $ref: '#/components/responses/Error.InternalServer'
  /signin:
    post:
      tags:
        - Authentication
      summary: SignIn
      description: Authenticate user and return a token in the header
      operationId: signIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: SignIn successfully. Token returned in Authorization header.
          headers:
            Authorization:
              description: "Bearer {created token}"
              schema:
                type: string
                example: "Bearer abcdefg123..."
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: object
        '400':
          $ref: '#/components/responses/Error.BadRequest'
        '401':
          $ref: '#/components/responses/Error.Unauthorized'
        '500':
          $ref: '#/components/responses/Error.InternalServer'

  /search:
    get:
      tags:
        - Search
      summary: Multi-content search
      description: Returns a list of movies and TV shows matching the query.
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Search keywords
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Search results retrieved successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/Error.BadRequest'
        '401':
          $ref: '#/components/responses/Error.Unauthorized'
        '500':
          $ref: '#/components/responses/Error.InternalServer'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        uri:
          type: string
          example: "/api/signup"
        timestamp:
          type: string
          format: date-time
        data:
          oneOf:
            - type: object
            - type: 'null'
        error:
          oneOf:
            - $ref: '#/components/schemas/ApiErrorDetail'
            - type: 'null'

    ApiErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    SignUpRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          writeOnly: true
          example: "password"
        name:
          type: string
          example: "John Doe"

    SignInRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          writeOnly: true
          example: "password"
    
    SearchResponse:
      type: object
      properties:
        works:
          type: array
          items:
            $ref: '#/components/schemas/Work'
    
    Work:
      type: object
      required:
        - media_type
        - id
        - overview
      properties:
        media_type:
          type: string
          enum: [movie, tv]
          description: "Discriminator to distinguish between movie and tv"
        id:
          type: integer
          description: "TMDB ID"
        overview:
          type: string
        poster_path:
          oneOf:
            - type: string
            - type: 'null'
      discriminator:
        propertyName: media_type
        mapping:
          movie: '#/components/schemas/MovieSummary'
          tv: '#/components/schemas/TvSummary'
      oneOf:
        - $ref: '#/components/schemas/MovieSummary'
        - $ref: '#/components/schemas/TvSummary'
    
    MovieSummary:
      allOf:
        - $ref: '#/components/schemas/Work'
        - type: object
          properties:
            title:
              type: string
            release_date: 
              oneOf:
                - type: string
                  format: date
                - type: 'null'
    
    TvSummary:
      allOf:
        - $ref: '#/components/schemas/Work'
        - type: object
          properties:
            name:
              type: string
            first_air_date: 
              oneOf:
                - type: string
                  format: date
                - type: 'null'

  responses:
    Error.BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    Error.Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    Error.Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    Error.InternalServer:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'