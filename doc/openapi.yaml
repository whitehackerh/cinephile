openapi: 3.1.0
info:
  title: Cinephile API
  version: 1.0.0
  description: API for managing viewing history for movies and TV series

servers:
  - url: http://localhost:8080/api
    description: Local development server

paths:
  /signup:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Register a new User
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: User created successfully. No content returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                      error:
                        type: 'null'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '409':
          $ref: '#/components/responses/ErrorConflict'
        '500':
          $ref: '#/components/responses/ErrorInternalServer'

  /signin:
    post:
      tags:
        - Authentication
      summary: SignIn
      description: Authenticate user and return a token in the header
      operationId: signIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: SignIn successfully. Token returned in Authorization header.
          headers:
            Authorization:
              description: "Bearer {created token}"
              schema:
                type: string
                example: "Bearer abcdefg123..."
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                      error:
                        type: 'null'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '500':
          $ref: '#/components/responses/ErrorInternalServer'

  /search:
    get:
      tags:
        - Work
      summary: Multi-content search
      description: Returns a list of movies and TV shows matching the query.
      operationId: search
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Search keywords
          required: true
          schema:
            type: string
            minLength: 1
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Search results retrieved successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SearchResponse'
                      error:
                        type: 'null'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '500':
          $ref: '#/components/responses/ErrorInternalServer'

  /movie/{id}:
    get:
      tags:
        - Work
      summary: Movie Detail
      description: Get movie detail data
      operationId: getMovieById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Movie ID from TMDB
          schema:
            type: integer
            example: 12345
      responses:
        '200':
          description: Movie details retrieved successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Movie'
                      error:
                        type: 'null'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternalServer'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      required:
        - uri
        - timestamp
        - data
        - error
      properties:
        uri:
          type: string
          example: "/api/signup"
        timestamp:
          type: string
          format: date-time
        data:
          oneOf:
            - type: object
            - type: 'null'
        error:
          oneOf:
            - $ref: '#/components/schemas/ApiErrorDetail'
            - type: 'null'

    ApiErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string

    SignUpRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          writeOnly: true
          example: "password"
        name:
          type: string
          example: "John Doe"

    SignInRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          writeOnly: true
          example: "password"

    SearchResponse:
      type: object
      required:
        - works
        - page
        - total_pages
        - total_results
      properties:
        works:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/Work'
        page:
          type: integer
          minimum: 1
        total_pages:
          type: integer
          minimum: 1
        total_results:
          type: integer
          minimum: 0

    WorkBase:
      type: object
      required:
        - media_type
        - id
        - overview
        - poster_path
      properties:
        media_type:
          type: string
          enum: [movie, tv]
        id:
          type: integer
        overview:
          oneOf:
            - type: string
            - type: 'null'
        poster_path:
          oneOf:
            - type: string
            - type: 'null'

    MovieSummary:
      allOf:
        - $ref: '#/components/schemas/WorkBase'
        - type: object
          required:
            - media_type
            - title
            - release_date
          properties:
            media_type:
              const: movie
            title:
              type: string
            release_date:
              oneOf:
                - type: string
                  format: date
                - type: 'null'

    TvSummary:
      allOf:
        - $ref: '#/components/schemas/WorkBase'
        - type: object
          required:
            - media_type
            - name
            - first_air_date
          properties:
            media_type:
              const: tv
            name:
              type: string
            first_air_date:
              oneOf:
                - type: string
                  format: date
                - type: 'null'

    Work:
      type: object
      discriminator:
        propertyName: media_type
        mapping:
          movie: '#/components/schemas/MovieSummary'
          tv: '#/components/schemas/TvSummary'
      oneOf:
        - $ref: '#/components/schemas/MovieSummary'
        - $ref: '#/components/schemas/TvSummary'

    Movie:
      type: object
      required:
        - id
        - title
        - original_title
        - overview
        - poster_path
        - backdrop_path
        - release_date
        - runtime
        - vote_average
        - tagline
        - genres
      properties:
        id:
          type: integer
        title:
          type: string
        original_title:
          type: string
        overview:
          oneOf:
            - type: string
            - type: 'null'
        poster_path:
          oneOf:
            - type: string
            - type: 'null'
        backdrop_path:
          oneOf:
            - type: string
            - type: 'null'
        release_date:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        runtime:
          oneOf:
            - type: integer
            - type: 'null'
        vote_average:
          type: number
          format: float
        tagline:
          oneOf:
            - type: string
            - type: 'null'
        genres:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Genre'

    Genre:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string

  responses:
    ErrorBadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    ErrorUnauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    ErrorConflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    ErrorNotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    ErrorInternalServer:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'