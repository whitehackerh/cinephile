openapi: 3.1.0
info:
  title: Cinephile API
  version: 1.0.0
  description: API for managing viewing history for movies and TV series

servers:
  - url: http://localhost:8080/api
    description: Local development server

paths:
  /signup:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Register a new User
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: User Created successfully. No content returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: object
        '400':
          description: Invalid input data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '409':
          description: Email address already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

components:
  schemas:
    ApiResponse:
      type: object
      properties:
        uri:
          type: string
          example: "/api/signup"
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          nullable: true
        error:
          $ref: '#/components/schemas/ApiErrorDetail'

    ApiErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    SignUpRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          writeOnly: true
          example: "password"
        name:
          type: string
          example: "John Doe"
